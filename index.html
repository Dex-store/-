<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEX trading</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="brand">
    <img src="logo.png" class="logo">
    <h2>DEX trading</h2>
  </div>

  <button onclick="toggleCart()" class="cart-btn">
    🛒 <span id="cartCount">0</span>
  </button>
</header>

<section class="hero">
  <h1>حقق دخل إضافي من التداول</h1>
  <p>منتجات احترافية + دعم كامل + نتائج حقيقية</p>
</section>

<section class="products" id="products"></section>

<!-- CART -->
<div class="cart" id="cart">
  <h2>سلة المشتريات</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <button onclick="checkout()" class="btn buy">إتمام الطلب عبر واتساب</button>
</div>

<script src="script.js"></script>
</body>
</html>
